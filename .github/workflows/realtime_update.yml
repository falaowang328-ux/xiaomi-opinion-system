name: Realtime Opinion Update

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas jieba snownlp requests beautifulsoup4

      - name: Run realtime crawler
        run: |
          python scripts/realtime_crawl.py

      - name: Run realtime analysis
        run: |
          python scripts/realtime_analysis.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/baidu_realtime_data.csv
          git add data/response_data.csv
          git add data/problem_summary.txt

          git diff --cached --quiet || git commit -m "auto update opinion data"
          git push
